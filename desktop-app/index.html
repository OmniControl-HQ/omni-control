<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniControl Desktop Server</title>
  <!-- Modern Font from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #6366f1; /* Indigo */
      --accent-glow: rgba(99, 102, 241, 0.15);
      --success-color: #10b981; /* Emerald */
      --success-glow: rgba(16, 185, 129, 0.3);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: -10%;
      right: -10%;
      z-index: 1;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
      bottom: -10%;
      left: -10%;
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 48px;
      width: 90%;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                  inset 0 1px 1px rgba(255, 255, 255, 0.1);
      transform: translateY(0);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .container:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5),
                  inset 0 1px 1px rgba(255, 255, 255, 0.15),
                  0 0 40px rgba(99, 102, 241, 0.05);
    }

    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent-color), #4f46e5);
      border-radius: 20px;
      margin-bottom: 28px;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 12px;
      background: linear-gradient(to right, #ffffff, #d1d5db);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 9999px;
      padding: 6px 16px;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--success-color);
      margin-bottom: 32px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--success-color);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--success-glow);
      animation: pulse 2s infinite;
    }

    .details-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      text-align: left;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .details-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .details-row:last-child {
      margin-bottom: 0;
    }

    .label {
      color: var(--text-muted);
    }

    .value {
      font-weight: 600;
      color: var(--text-main);
      font-family: monospace;
    }

    .instruction {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <!-- Minimalist Console/Control Icon -->
      <svg class="logo-icon" viewBox="0 0 24 24">
        <path d="M4 17l6-6-6-6M12 19h8" />
      </svg>
    </div>

    <h1>OmniControl</h1>
    
    <div class="status-badge">
      <div class="status-dot"></div>
      Desktop Server Running
    </div>

    <div class="details-box">
      <div class="details-row">
        <span class="label">Socket Port:</span>
        <span class="value">5000</span>
      </div>
      <div class="details-row">
        <span class="label">Status:</span>
        <span class="value" style="color: var(--success-color);">Listening</span>
      </div>
    </div>

    <p class="instruction">
      Start the React Native mobile application and connect to the desktop server's local IP address to test the link.
    </p>
  </div>

</body>
</html>
